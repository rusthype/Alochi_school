name: Flutter Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  # ─── ANDROID ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.27.4', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=API_URL=https://api.alochi.uz
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk alochi-maktab-${{ github.ref_name }}.apk
      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: alochi-maktab-${{ github.ref_name }}.apk

  # ─── WINDOWS ──────────────────────────────────────────────
  windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.27.4', channel: stable, cache: true }
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release --dart-define=API_URL=https://api.alochi.uz
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build NSIS installer
        uses: joncloud/makensis-action@v4
        with:
          script-file: windows/installer.nsi
          arguments: /V3
      - name: Rename installer
        run: mv AlochiMaktab-Setup.exe alochi-maktab-setup-${{ github.ref_name }}.exe
        shell: pwsh
      - uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: alochi-maktab-setup-${{ github.ref_name }}.exe

  # ─── MACOS ────────────────────────────────────────────────
  macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.27.4', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter config --enable-macos-desktop
      - run: flutter build macos --release --dart-define=API_URL=https://api.alochi.uz
      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../alochi-maktab-macos-${{ github.ref_name }}.zip *.app
      - uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: alochi-maktab-macos-${{ github.ref_name }}.zip

  # ─── RELEASE ──────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [android, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: List downloaded files
        run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          name: "A'lochi Maktab ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            alochi-maktab-${{ github.ref_name }}.apk
            alochi-maktab-setup-${{ github.ref_name }}.exe
            alochi-maktab-macos-${{ github.ref_name }}.zip
